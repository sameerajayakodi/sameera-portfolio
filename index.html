<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sameera Jayakodi | Portfolio</title>
    <meta name="description" content="Sameera Jayakodi is an Associate Software Engineer specializing in React, Node.js, Spring Boot, and Full-Stack Development." />
    <link rel="icon" type="image/png" href="/assets/favicon.png" />
    <link rel="apple-touch-icon" href="/assets/favicon.png" />
    <script>
      // Prevent "Cannot set property fetch of #<Window> which has only a getter" errors
      try {
        let currentFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get() {
            return currentFetch;
          },
          set(newFetch) {
            currentFetch = newFetch;
          },
          configurable: true,
          enumerable: true
        });
      } catch (e) {
        console.warn("Could not patch window.fetch setter:", e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
